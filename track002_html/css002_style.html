<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 내부 적용</title>

    <style>

        /*  선택자   { 속성 : 값;   }   */

        div { 
            width: 300px;
            margin: 50px auto;
            background-color: rgb(255, 250, 225);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease-in-out;
        }

        div:hover {
            background-color: #e3ffa1;
            transform: rotate(-5deg);
        }

        div:hover h3 {
            color: #fff;
            border-left: 4px dotted #fff;
            background-color: #0d45bd;
        }

        /* Q.1 h3의 글자색상, border */
        h3 {
            width: fit-content;
            color: #ca295f;
            border-left: 2px solid #ca295f;
            padding: 4px 20px;
            background-color: #fff;
        }
        /* Q.2 p의 글자사이즈, 정렬 */
        p {
            color:#333;
            font-size: 14px;
            text-align: center;
            font-style: italic; 
        }

    </style>
</head>

<body>
    <div>
        <h3>인라인</h3>
        <p>태그 안에 직접 적용</p>
        <p style="color: red;">color : red</p>
    </div>

    <div>
        <h3>내부 스타일</h3>
        <p> head 안에 style 태그 사용</p>
        <pre>
            p       { color: red; }
            선택자  { 속성 : 값;  }
        </pre>
    </div>
    
    <div>
        <h3>외부 스타일</h3>
        <p>별도의 .CSS 파일을 만들어서 link 태그로 연결</p>
    </div>
</body>
</html>
