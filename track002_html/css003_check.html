<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1wk check</title>
    <style>
        
        *{ margin:0; padding:0; }

        /* Q1. body 글꼴 : Segoe UI, 배경색 : #f9f9f9 */

        body {
            font-family: 'Segoe UI';
            background-color: #f9f9f9;
        }

        /* Q2. h1 중앙정렬, 글자색상 : #333 */

        h1 {
            text-align: center;
            color: #333;
        }

        /* Q3. .notice 카드 너비 : 350px, 테두리 : 1px 실선 #ccc, 안쪽여백 : 15px, 여백 : 20px 
        중앙정렬 */ 
        .notice {
            width: 350px;
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px auto;
            text-align: center;
        }

        /* Q4. .notice h2 글자크기 : 18px, 글자색상 : #444 */ 
        .notice h2 {
            font-size: 18px;
            color: #444;
        }

        /* Q5. #urgent 배경색 : #ffe0e0 , 부드러운효과*/
        #urgent {
            background-color: #ffe0e0;
            transition: all 0.5s;
        }

        /* Q6.  #urgent  마우스 올렸을때 배경빨강, 글자 white */ 
        #urgent:hover {
            background-color: red;
            color: yellow;
            
        }

        /* Q7. .notice img 너비/높이 : 80px, 모서리둥글게 */ 
        .notice img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            transition: all 0.5s;
        }


        /* bonus */
        .notice img:hover {
            transform: rotateY(180deg);
        }
        
    </style>
</head>



<body>

    <div>
        <h1>공지사항</h1>

        <div class="notice">
            <p><img src="./img/portfolio1.jpg" alt="공지사항 안내" /></p>
            <h2>일반 공지</h2>
            <p>다음 주 월요일은 정기 점검이 있습니다.</p>
        </div> <!-- div 끝-->

        <div class="notice" id="urgent">
            <h2>긴급 공지</h2>
            <p>오늘 오후 서버 점검으로 서비스가 일시 중단됩니다.</p>
        </div> <!-- div 끝-->

    </div><!-- div 끝-->
    
</body>
</html>
