<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>홈페이지 레이아웃 예제 (문제 버전)</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box;}

    ul, ol { list-style: none; }
    a { text-decoration: none; color: inherit; }

    /* Q1. body 글꼴 : Arial, sans-serif / 배경색 : #f0f9ff */
    body { font-family: Arial, Helvetica, sans-serif; background-color: #f0f9ff;}

    /* Q2. header : flex 컨테이너, justify-content space-between, align-items center, 
    배경 #333, 글자색 흰색, 안쪽여백 15px 30px */
    header { 
      display: flex; justify-content: space-between;
      align-items: center; padding: 15px 30px;
      background-color: #333; color: #fff;
    }

    /* Q3. header .logo : 글자크기 20px, 글자굵게 */
    header .logo { font-size: 20px; font-weight: bold; }

    /* Q4. header nav ul : flex 컨테이너, gap 20px, 기본 점 제거, 여백/패딩 0 */
    header nav ul { display: flex; gap: 20px; }

    /* Q5. header nav a : 글자색 흰색, 밑줄 제거, 글자굵게 */
    header nav a { color: #fff; font-weight: bold;}

    /* Q6. header nav a:hover : 글자색 #ff6600 */
    header nav a:hover { color: #ff6600; }

    /* Q7. .banner : flex 컨테이너, 중앙정렬, 높이 300px, 배경 #ff6600, 글자색 흰색, 글자크기 30px */
    .banner { 
      display: flex; justify-content: center; /* justify - 메인축 방향으로 정렬 */
      align-items: center; /* align - 수직축 방향으로 정렬 */
      height: 300px; font-size: 30px;
      background-color: #ff6600; color: #fff;
    }
    
    /* Q8. .cards : flex 컨테이너, flex-wrap wrap, gap 20px, 
    너비 80%, 중앙정렬(margin auto), 위아래 여백 40px */
    .cards {  display: flex; flex-wrap: wrap; gap: 20px;
        width: 80%; margin: 40px auto; }

    /* Q9. .card : flex 1 1 calc(33% - 20px), 배경 흰색, 모서리둥글게 8px, 
    그림자 효과, 안쪽여백 20px, 중앙정렬(text-align center) */
    .card { 
      flex: 1 1 calc(33% - 20px);
      /* flex-grow: 1, flex-shrink: 1, flex-basis: calc(33%-20px); */      
      padding: 20px; border-radius: 8px;
      background-color: #fff; text-align: center;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
    }

    .card img { 
      display: block; position: relative; margin: 0 auto 20px; 
      width: 100%; height: 120px; object-fit: cover;
      transition: all 0.3s;
    }

    .card:hover img { filter: grayscale(100%) blur(1px) brightness(0.5); }

    /* Q10. .layout : flex 컨테이너, 너비 80%, 중앙정렬(margin auto), gap 20px, 위아래 여백 40px */
    .layout { display: flex; gap: 20px; margin: 40px auto; width: 80%; }

    /* Q11. .sidebar : flex 1, 배경 #eee, 안쪽여백 20px */
    .sidebar { flex: 1; padding: 20px; background-color: #888; 
      text-align: center; color: #fff; }

    /* Q12. .content : flex 3, 배경 흰색, 안쪽여백 20px, 그림자 효과 */
    .content { flex: 3; padding: 20px; 
      background-color: #fff; box-shadow: 0 0 5px rgba(0, 0, 0, 0.3); }

    /* Q13. footer : flex 컨테이너, 중앙정렬, 배경 #333, 글자색 흰색, 안쪽여백 20px */
    footer { display: flex; justify-content: center; padding: 20px; 
      background-color: #333; color: #fff; }

 
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <div class="logo">MyWebsite</div>
    <nav>
      <ul>
        <li><a href="#">HOME</a></li>
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">SERVICES</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <!-- 메인 배너 -->
  <div class="banner">
    메인 배너 영역
  </div>

  <!-- 카드 섹션 -->
  <section class="cards">
    <div class="card">
      <img src="./img/my1.jpg" alt="이미지 1"> 
      <p>카드 1</p>
    </div>
    <div class="card">
      <img src="./img/my2.jpg" alt="이미지 2"> 
      <p>카드 2</p>
    </div>
    <div class="card">
      <img src="./img/my3.jpg" alt="이미지 3"> 
      <p>카드 3</p>
    </div>
    <div class="card">카드 4</div>
    <div class="card">카드 5</div>
    <div class="card">카드 6</div>
  </section>

  <!-- 사이드바 + 콘텐츠 -->
  <section class="layout">
    <aside class="sidebar">사이드바 메뉴</aside>
    <article class="content">본문 콘텐츠 영역</article>
  </section>

  <!-- 푸터 -->
  <footer>
    © 2026 MyWebsite. All rights reserved.
  </footer>

</body>
</html>
