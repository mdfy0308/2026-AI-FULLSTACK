<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ID/CLASS</title>

    <style>

        /* 전체 여백 빼기 */
        * {  margin: 0; padding: 0; }

        /* body 좋아하는 글꼴, 배경*/
        body {
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background: linear-gradient(120deg, #fffefb, #ffeeee);
        }

        /* Q1. h3 중앙정렬, 글자색상 : #e1306c,  아래쪽여백 : 10px  */
        h3 {
            text-align: center;
            color: #e1304d;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Q2. p 중앙정렬, 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 20px */
        p {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        /* Q3. div 배경색상 : #fff, 너비 : 300px, 여백 : 위아래 30px 좌우 중앙정렬, 
        안쪽여백 : 20px, 테두리 둥글게 : 15px, 그림자 효과, 왼쪽정렬
        text-shadow: 0 0 5px gainsboro; */
        div {
            width: 300px;
            background-color: #fff;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 5px rgba(180, 0, 0, 0.1);
            text-align: left;
            transition: all 0.3s ease-in-out;
        }

        div:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 5px rgba(180, 0, 0, 0.3);
        }

        /* Q4. dt 글자굵기 : 굵게, 아래쪽여백 : 10px, 글자색상 : #333 */
        dt {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-style: italic;
        }
        
        /* Q5. dd 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 8px, 왼쪽 안쪽여백 : 10px */
        dd {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            padding-left: 10px;
        }
       
        /* Q6. id1, id2 글자색상 :  각각 색상다르게 글자굵기 : 굵게 
        id = "id1", 태그 없이 사용해도 #id를 찾을 수 있음 */
        #id1 {
            color: cornflowerblue;
            font-weight: bold;
        }

        #id2 {
            color: salmon;
            font-weight: bold;
        }
       
        /* Q7. .mycss 배경색상 : #f9f1f7, 왼쪽 테두리 : 4px 실선 #e1306c, 
        안쪽여백 : 5px 10px, 테두리 둥글게 : 5px 
        class=".mycss" */
        .mycss {
            background-color: #fff5f5;
            border-left: 4px solid #e1306c;
            padding : 5px 10px;
            border-radius: 5px;
        }

        .two {
            background-color: seashell;
            border-color: salmon;
        }



    </style>
</head>
<body>

    <div>
        <h3>id</h3>
        <p> css 선택자  - 유일한 값 </p>
        <dl>
            <dt> id 특징 </dt>
            <dd> html 문서에서 한번만 사용 가능 </dd>
            <dd id="id1"> 중복 불가 - Error: Duplicate ID </dd>
            <dd id="id2"> css에서는 #id명 </dd>
            <dd> 우선순위 id와 class 모두 있을 때 id가 더 높음 </dd>
        </dl>
    </div> <!-- end div -->

    <div>
        <h3>class</h3>
        <p> css 선택자 - 여러개 선택시 </p>
        <dl>
            <dt> class의 특징 </dt>
            <dd class="mycss"> 재사용 가능 : 여러 요소에 class 지정 가능 </dd>
            <dd class="mycss two"> 하나의 요소에 여러개의 class 사용 가능 </dd>
            <dd> css에서는 .class명 </dd>
            <dd> 반복되는 스타일에 적합 </dd>
        </dl>
    </div> <!-- end div -->

</body>
</html>
