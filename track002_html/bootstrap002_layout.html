<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="./css/my.css" rel="stylesheet">
</head>
<body class="p-3">
    <div class="container my-5 p-3 card text-center">
        <h3 class="card-header">001. LAYOUT</h3>
        <p class="alert alert-info">표 - 줄 - 칸</p>
        <p>.container : 표, 전체 박스</p>
        <p>.row :  박스 안의 줄, 층</p>
        <p>.col-sm(사이즈)-칸 수 : 칸, 층당 12칸 기준</p>
    </div>

    <div class="my-5">
        <h3>002. Container (박스)</h3>
        <div class="container bg-warning p-3">CONTAINER</div>
        <div class="container-fluid bg-success p-3" >container-fluid</div>
    </div>

    <div class="my-5">
        <h3>003. row(층) </h3>
        <div class="container bg-warning">
            <div class="row bg-warning p-3">3층</div>
            <div class="row bg-info    p-3">2층</div>
            <div class="row bg-success p-3">1층</div>
        </div>
    </div>

    <div class="my-3">
        <h3>004. col-디바이스-칸 수(칸)</h3>
        <div class="container p-3 text-center">
            <div class="row">
                <div class="col-sm-12 bg-dark p-3 text-bg-dark">12칸</div>
            </div>
            <div class="row">
                <div class="col-sm-6 bg-info p-3">6칸</div>
                <div class="col-sm-6 bg-success p-3">6칸</div>
            </div>
            <!-- row > 2 / 10 -->
            <div class="row">
                <div class="col-sm-2 bg-success p-3">2칸</div>
                <div class="col-sm-10 bg-danger p-3 text-bg-danger">10칸</div>
            </div>
            <!-- row 5 5 2-->
            <div class="row">
                <div class="col-sm-5 bg-primary p-3">5칸</div>
                <div class="col-sm-5 bg-light p-3">5칸</div>
                <div class="col-sm-2 bg-info p-3">2칸</div>
            </div>
            <!--4 4 4-->
            <div class="row">
                <div class="col-sm-4 bg-warning p-3 text-bg-warning">4칸</div>
                <div class="col-sm-4 bg-danger p-3 text-bg-danger">4칸</div>
                <div class="col-sm-4 bg-warning p-3 text-bg-warning">4칸</div>
            </div>
            <!--3 3 3 3 -->
            <div class="row">
                <div class="col-sm-3 bg-light p-3">3칸</div>
                <div class="col-sm-3 bg-secondary p-3">3칸</div>
                <div class="col-sm-3 bg-success p-3">3칸</div>
                <div class="col-sm-3 bg-primary p-3">3칸</div>
            </div>
        </div>
        
         
    </div>

</body>
</html>
